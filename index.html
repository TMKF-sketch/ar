<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ElekiNail AR Portal - Ver.0.32 Force Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        /* 背面カメラ用：鏡像反転（scaleX(-1)）を完全に排除して現実と同じ向きにする */
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #ar-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #start-btn {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: linear-gradient(45deg, #00ffcc, #0077ff); border: none; border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,255,204,0.5); z-index: 100; cursor: pointer;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 20px; z-index: 50; display: none; text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="ar-canvas"></canvas>
    <div id="loading">アバター生成中...</div>
    <button id="start-btn" onclick="initAR()">相棒を受肉させる</button>
</div>

<script>
    let video, arCanvas, renderer, scene, camera, avatarGroup = null;
    let hands, mpCamera, clock;

    function initAR() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        video = document.getElementById('webcam');
        arCanvas = document.getElementById('ar-canvas');
        clock = new THREE.Clock();

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ canvas: arCanvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.DirectionalLight(0xffffff, 2.0);
        light.position.set(1.0, 2.0, 1.0).normalize();
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);

        camera.position.set(0.0, 0.0, 1.5);

        // --- 🛠️ サイバーロボくん生成 ---
        avatarGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0077ff, roughness: 0.2, metalness: 0.5 });
        const jointMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.1 });
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xfff000 }); 

        const headGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.y = 0.18;
        avatarGroup.add(head);

        const eyeGeo = new THREE.BoxGeometry(0.02, 0.02, 0.01);
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.03, 0.20, 0.06);
        const rightEye = leftEye.clone();
        rightEye.position.x = 0.03;
        avatarGroup.add(leftEye, rightEye);

        const torsoGeo = new THREE.CylinderGeometry(0.06, 0.04, 0.16, 8);
        const torso = new THREE.Mesh(torsoGeo, bodyMat);
        torso.position.y = 0.04;
        avatarGroup.add(torso);

        const armGeo = new THREE.BoxGeometry(0.03, 0.12, 0.03);
        const leftArm = new THREE.Mesh(armGeo, jointMat);
        leftArm.position.set(-0.09, 0.08, 0);
        avatarGroup.add(leftArm);

        const rightArm = leftArm.clone();
        rightArm.position.x = 0.09;
        avatarGroup.add(rightArm);

        const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.1, 8);
        const leftLeg = new THREE.Mesh(legGeo, jointMat);
        leftLeg.position.set(-0.03, -0.08, 0);
        const rightLeg = leftLeg.clone();
        rightLeg.position.x = 0.03;
        avatarGroup.add(leftLeg, rightLeg);

        scene.add(avatarGroup);
        avatarGroup.visible = false;

        document.getElementById('loading').style.display = 'none';
        startCamera();
    }

    function startCamera() {
        hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            const time = clock.getElapsedTime();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // ★究極の背面カメラ専用計算：MediaPipeの生データを計算式レベルで強制的に左右反転させる
                // landmarks.xが0(左端)のときpalmXは+1.1、1(右端)のとき-1.1になり、Three.jsの空間と物理的に一致
                const palmX = -(landmarks[9].x - 0.5) * 2.2;
                const palmY = -(landmarks[9].y - 0.5) * 3.0; 

                const distance = Math.sqrt(
                    Math.pow(landmarks[12].x - landmarks[0].x, 2) + 
                    Math.pow(landmarks[12].y - landmarks[0].y, 2)
                );

                if (distance > 0.35 && avatarGroup) { 
                    avatarGroup.visible = true;
                    // 計算された「鏡像補正済みの座標」をそのまま直結して100%シンクロ
                    avatarGroup.position.set(palmX, palmY, 0);
                    
                    avatarGroup.rotation.y = Math.PI + Math.sin(time * 2) * 0.3; 
                    avatarGroup.position.y += Math.sin(time * 5) * 0.02;       
                } else if (avatarGroup) {
                    avatarGroup.visible = false;
                }
            } else if (avatarGroup) {
                avatarGroup.visible = false;
            }
            renderer.render(scene, camera);
        });

        mpCamera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720,
            facingMode: 'environment'
        });
        mpCamera.start();
    }

    window.addEventListener('resize', () => {
        if (!camera) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
