<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ElekiNail AR - Ver.0.51 Natural Synchro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(1) !important; }
        #ar-canvas { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #start-btn {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            padding: 18px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: linear-gradient(45deg, #00ffcc, #0077ff); border: none; border-radius: 50px; z-index: 100;
            box-shadow: 0 0 15px #00ffcc;
        }
        #status {
            position: absolute; top: 10px; left: 10px; color: #00ffcc; background: rgba(0,0,0,0.7);
            padding: 10px; font-size: 12px; z-index: 1000; border-radius: 5px;
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="ar-canvas"></canvas>
    <div id="status">ステータス: 準備完了。ボタンを押してください。</div>
    <button id="start-btn" onclick="initAR()">カムイちゃんを召喚する！</button>

<script>
    let currentVrm = null, scene, camera, renderer, clock, hands;
    const statusEl = document.getElementById('status');

    function log(msg) { statusEl.innerText = `ステータス: ${msg}`; }

    window.onerror = (e) => log(`エラー発生: ${e}`);

    async function initAR() {
        document.getElementById('start-btn').style.display = 'none';
        log('初期化中...');

        const video = document.getElementById('webcam');
        clock = new THREE.Clock();

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 1.8);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('ar-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
        mainLight.position.set(1, 2, 1).normalize();
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        log('kamui.vrm をロード中...');
        const loader = new THREE.GLTFLoader();
        loader.load(
            './kamui.vrm',
            (gltf) => {
                log('VRMパース中...');
                const vrmLib = (typeof vrm !== 'undefined') ? vrm.VRM : THREE.VRM;
                
                vrmLib.from(gltf).then((vrmObj) => {
                    currentVrm = vrmObj;
                    scene.add(vrmObj.scene);
                    
                    vrmObj.scene.rotation.y = Math.PI; 
                    vrmObj.scene.scale.set(4.0, 4.0, 4.0); 
                    
                    vrmObj.scene.visible = false;
                    log('受肉完了！カメラを起動します。');
                    startCamera(video);
                }).catch(err => log(`変換失敗: ${err.message}`));
            },
            (progress) => log(`ロード中: ${Math.round(progress.loaded/progress.total*100)}%`),
            (error) => log(`ロード失敗: ファイルパスを確認してください。`)
        );
    }

    function startCamera(video) {
        hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        
        hands.onResults((results) => {
            const delta = clock.getDelta();
            if (currentVrm && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                const handBase = Math.sqrt(
                    Math.pow(lm[9].x - lm[0].x, 2) + 
                    Math.pow(lm[9].y - lm[0].y, 2)
                );

                const fingerLength = Math.sqrt(
                    Math.pow(lm[12].x - lm[0].x, 2) + 
                    Math.pow(lm[12].y - lm[0].y, 2)
                );

                const stretchRatio = fingerLength / handBase;
                log(`追従中 (グー・パー度: ${stretchRatio.toFixed(2)})`);

                if (stretchRatio > 1.45) {
                    currentVrm.scene.visible = true;
                    
                    const x = (lm[9].x - 0.5) * 2.2;
                    
                    // 🚨 【1.0完全接地リライト】
                    // ℝΨØの「現場ハック」に基づき、係数を「1.0」へパージ！
                    // アバターの足元をMediaPipeのlm[9]（中指の付け根）に1ビットの狂いもなく完全同期。
                    // これにより手首を返してもアバターが登っていかず、
                    // 最も自然な「対話体勢」でのリアリティが最大化されます！
                    const heightMultiplier = 1.0; 
                    const dynamicOffsetY = -(lm[9].y - 0.5) * 3.0 + (handBase * heightMultiplier);
                    
                    currentVrm.scene.position.set(x, dynamicOffsetY, 0);
                    currentVrm.update(delta);
                } else {
                    currentVrm.scene.visible = false;
                }
            } else if (currentVrm) {
                currentVrm.scene.visible = false;
                log('手のひらをかざして下さい✋️');
            }
            renderer.render(scene, camera);
        });

        const cam = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480, facingMode: 'environment'
        });
        cam.start().then(() => log('稼働中: 手のひらをかざして下さい✋️'));
    }
</script>
</body>
</html>
