<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ElekiNail AR - Ver.0.42 Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #ar-canvas { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #start-btn {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            padding: 18px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #0077ff; border: none; border-radius: 50px; z-index: 100;
        }
        #status {
            position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7);
            padding: 10px; font-size: 12px; z-index: 1000; max-width: 80%; word-break: break-all;
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="ar-canvas"></canvas>
    <div id="status">ステータス: ページ読込完了。ボタンを押してください。</div>
    <button id="start-btn" onclick="initAR()">相棒を受肉させる</button>

<script>
    let currentVrm = null, scene, camera, renderer, clock, hands;
    const statusEl = document.getElementById('status');

    function log(msg) { statusEl.innerText = `ステータス: ${msg}`; console.log(msg); }

    // エラー検知用
    window.onerror = (e) => log(`エラー発生: ${e}`);

    async function initAR() {
        document.getElementById('start-btn').style.display = 'none';
        log('初期化中...');

        const video = document.getElementById('webcam');
        clock = new THREE.Clock();

        // 1. Three.js セットアップ
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 1.5);
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('ar-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));

        // 2. VRM読み込み ( pixivのライブラリは vrm というグローバル変数に入る )
        log('kamui.vrm 読み込み開始...');
        const loader = new THREE.GLTFLoader();
        loader.load(
            './kamui.vrm',
            (gltf) => {
                log('VRMパース中...');
                // ここが重要：vrm.VRM か THREE.VRM かを自動判別
                const vrmLib = (typeof vrm !== 'undefined') ? vrm.VRM : THREE.VRM;
                if (!vrmLib) {
                    log('エラー: VRMライブラリが読み込まれていません。');
                    return;
                }

                vrmLib.from(gltf).then((vrmObj) => {
                    currentVrm = vrmObj;
                    scene.add(vrmObj.scene);
                    vrmObj.scene.rotation.y = Math.PI;
                    vrmObj.scene.scale.set(0.08, 0.08, 0.08);
                    vrmObj.scene.visible = false;
                    log('受肉完了！カメラ起動します。');
                    startCamera(video);
                }).catch(err => log(`変換失敗: ${err.message}`));
            },
            (progress) => log(`ロード中: ${Math.round(progress.loaded/progress.total*100)}%`),
            (error) => log(`ロード失敗: ファイル名が kamui.vrm か確認してください。`)
        );
    }

    function startCamera(video) {
        hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        
        hands.onResults((results) => {
            if (currentVrm && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                currentVrm.scene.visible = true;
                currentVrm.scene.position.set(-(lm[9].x - 0.5) * 2.2, -(lm[9].y - 0.5) * 3.0, 0);
                currentVrm.update(clock.getDelta());
            } else if (currentVrm) {
                currentVrm.scene.visible = false;
            }
            renderer.render(scene, camera);
        });

        const cam = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480, facingMode: 'environment'
        });
        cam.start().then(() => log('稼働中: 手をかざしてください'));
    }
</script>
</body>
</html>
